  <script type="text/javascript">
    // Decodes the path encoded by public/404.html back into a real URL
    // before React Router mounts. See public/404.html for the other half.
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?')
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
      }
    }(window.location))
  </script>
