<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Merlin Marina</title>
  <script type="text/javascript">
    // GitHub Pages has no server-side rewrites, so a deep link like
    // /category/tanks-filters 404s on refresh. This encodes the real path
    // into a query string and redirects to index.html, which decodes it
    // back with history.replaceState before React Router ever sees it.
    // Source pattern: https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 0
    var l = window.location
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    )
  </script>
</head>
<body></body>
</html>
